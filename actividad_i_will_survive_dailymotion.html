<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PIT – Writing Station</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:radial-gradient(circle,#fed7aa 0%,#f97316 60%,#7c2d12 100%);
}

.container{
  width:90%;
  max-width:1000px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
}

.title{
  text-align:center;
  font-size:28px;
  margin-bottom:15px;
}

.topBar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:space-between;
  margin-bottom:15px;
}

.badge{
  padding:6px 12px;
  border-radius:999px;
  background:#ffedd5;
  border:2px solid #f97316;
  font-size:12px;
  font-weight:800;
}

.button{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:800;
}

.orangeBtn{background:#f97316;color:white;}
.whiteBtn{background:white;border:2px solid #f97316;}

textarea{
  width:100%;
  min-height:140px;
  padding:10px;
  border-radius:10px;
  border:2px solid #f97316;
  margin-top:10px;
}

.hidden{display:none;}

.prompt{
  background:#fff7ed;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.feedback{
  margin-top:10px;
  padding:10px;
  background:#fff7ed;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">WRITING STATION</div>

<!-- LOGIN -->
<div id="login">
  <input id="nameInput" placeholder="Your name">
  <button class="button orangeBtn" onclick="start()">START</button>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<div class="topBar">
  <div class="badge" id="student"></div>
  <div class="badge" id="timer">00:00</div>
</div>

<div class="topBar">
  <button class="button whiteBtn" onclick="goMenu()">Main Menu</button>
  <button class="button whiteBtn" onclick="toggleTimer()">Pause</button>
</div>

<div class="prompt" id="promptBox"></div>

<textarea id="text"></textarea>

<div id="words">Words: 0</div>

<button class="button orangeBtn" onclick="check()">Submit</button>

<div id="feedback" class="feedback hidden"></div>

</div>

</div>

<script>

/* LOGIN */

let name = localStorage.getItem("pitStudent");

function start(){
  const n = document.getElementById("nameInput").value.trim();
  if(!n){alert("Enter name");return;}
  localStorage.setItem("pitStudent",n);
  name = n;
  init();
}

/* INIT */

function init(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("student").innerText="Student: "+name;
  loadTask();
  startTimer();
}

if(name){init();}

/* TIMER */

let sec=0, int=null;

function startTimer(){
  if(int) return;
  int=setInterval(()=>{
    sec++;
    let m=String(Math.floor(sec/60)).padStart(2,"0");
    let s=String(sec%60).padStart(2,"0");
    document.getElementById("timer").innerText=m+":"+s;
  },1000);
}

function toggleTimer(){
  if(int){
    clearInterval(int);
    int=null;
  }else{
    startTimer();
  }
}

/* TASK */

function loadTask(){
  document.getElementById("promptBox").innerHTML=
  "<b>Correct this sentence:</b><br>We was very nervous and there was many machines.";
}

/* WORD COUNT */

const text=document.getElementById("text");

text.addEventListener("input",()=>{
  const w=text.value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById("words").innerText="Words: "+w;
});

/* CHECK */

function check(){
  const t=text.value.toLowerCase();
  let msg="";

  if(!t.includes("we were")) msg+="Fix 'we was'<br>";
  if(!t.includes("there were")) msg+="Fix 'there was many'<br>";

  if(msg==="") msg="✅ Good job!";
  
  const box=document.getElementById("feedback");
  box.innerHTML=msg;
  box.classList.remove("hidden");
}

/* NAV */

function goMenu(){
  window.location.href="../index.html";
}

</script>

</body>
</html>
